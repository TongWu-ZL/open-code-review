name: Smoke Mac

on:
  workflow_dispatch:
  push:
    branches: [pr-13-windows]
    paths:
      - ".github/workflows/smoke-mac.yml"
      - "scripts/**"
      - "bin/**"
      - "package.json"

jobs:
  smoke:
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
    env:
      FORK_TAG: v0.0.0-fork-test.1
      FORK_REPO: TongWu-ZL/open-code-review
      EXPECTED_OS: darwin

    steps:
      - uses: actions/checkout@v4
        with:
          ref: pr-13-windows

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show OS / arch
        run: |
          echo "platform=$(node -e 'console.log(process.platform)')"
          echo "arch=$(node -e 'console.log(process.arch)')"

      - name: Patch package.json (version + urlPattern)
        run: |
          cp package.json package.json.orig
          jq --arg repo "$FORK_REPO" --arg tag "$FORK_TAG" '
            .version = "0.0.0"
            | .ocrConfig.urlPattern =
                "https://github.com/" + $repo + "/releases/download/" + $tag + "/opencodereview-{os}-{arch}"
          ' package.json > package.json.tmp
          mv package.json.tmp package.json
          echo "----- patched package.json -----"
          jq '{version, ocrConfig}' package.json

      - name: npm install (triggers scripts/install.js)
        env:
          OCR_NO_UPDATE: "1"
        run: npm install --foreground-scripts

      - name: Verify install.js produced bin/opencodereview
        run: |
          echo "----- bin/ -----"
          ls -la bin/
          node -e '
            const fs = require("fs");
            const files = fs.readdirSync("bin");
            console.log("readdir(bin):", files);

            if (!files.includes("opencodereview")) {
              console.error("::error::bin/opencodereview MISSING");
              process.exit(1);
            }
            if (files.includes("opencodereview.exe")) {
              console.error("::error::stray windows binary bin/opencodereview.exe present on unix");
              process.exit(1);
            }

            // Mach-O (single-arch) magic: cf fa ed fe (LE 64-bit). Fat binary: ca fe ba be.
            const head = fs.readFileSync("bin/opencodereview").subarray(0, 4).toString("hex");
            const ok = ["cffaedfe", "feedfacf", "cafebabe", "bebafeca"].includes(head);
            if (!ok) {
              console.error("::error::bin/opencodereview not a Mach-O binary (magic=" + head + ")");
              process.exit(1);
            }
            const stat = fs.statSync("bin/opencodereview");
            if (!(stat.mode & 0o111)) {
              console.error("::error::bin/opencodereview not executable (mode=" + stat.mode.toString(8) + ")");
              process.exit(1);
            }
            console.log("install.js verification OK (magic=" + head + ")");
          '

      - name: Run via bin/ocr.js
        env:
          OCR_NO_UPDATE: "1"
        run: |
          node bin/ocr.js --help || node bin/ocr.js -h || node bin/ocr.js
          echo "ocr.js dispatched successfully"

      - name: Snapshot binary before update
        id: before
        run: |
          BEFORE=$(shasum -a 256 bin/opencodereview | awk '{print $1}')
          echo "hash=$BEFORE" >> "$GITHUB_OUTPUT"
          echo "before=$BEFORE"

      - name: Force update.js to run
        run: |
          rm -rf "$HOME/.opencodereview"
          node scripts/update.js
          echo "update.js exit code: $?"

      - name: Verify update.js result
        run: |
          echo "----- bin/ after update -----"
          ls -la bin/
          node -e '
            const fs = require("fs");
            const files = fs.readdirSync("bin");
            console.log("readdir(bin):", files);

            if (!files.includes("opencodereview")) {
              console.error("::error::binary disappeared after update");
              process.exit(1);
            }
            if (files.includes("opencodereview.exe")) {
              console.error("::error::stray windows binary present after update");
              process.exit(1);
            }
            const leftover = files.filter(f => f.startsWith(".opencodereview.tmp."));
            if (leftover.length) {
              console.error("::error::leftover temp file(s): " + leftover.join(", "));
              process.exit(1);
            }
            const head = fs.readFileSync("bin/opencodereview").subarray(0, 4).toString("hex");
            const ok = ["cffaedfe", "feedfacf", "cafebabe", "bebafeca"].includes(head);
            if (!ok) {
              console.error("::error::binary corrupted after update (magic=" + head + ")");
              process.exit(1);
            }
            const stat = fs.statSync("bin/opencodereview");
            if (!(stat.mode & 0o111)) {
              console.error("::error::binary not executable after update");
              process.exit(1);
            }
            console.log("update.js verification OK");
          '

      - name: Re-run via bin/ocr.js after update
        env:
          OCR_NO_UPDATE: "1"
        run: node bin/ocr.js --help || node bin/ocr.js -h || node bin/ocr.js

      - name: Compare hashes (informational)
        run: |
          AFTER=$(shasum -a 256 bin/opencodereview | awk '{print $1}')
          echo "before=${{ steps.before.outputs.hash }}"
          echo "after=$AFTER"

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-mac-debug
          path: |
            bin/
            package.json
            package.json.orig
          if-no-files-found: ignore
